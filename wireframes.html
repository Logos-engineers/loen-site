<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>교회 수련회 — 와이어프레임 시안</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />

<style>
  html, body { margin:0; padding:0; background:#efece6; }
  body { font-family: 'Pretendard', 'Gowun Dodum', system-ui, sans-serif; color:#1c1c1c; }

  /* sketchy / wireframe primitives — used inside every artboard */
  .ph {
    border:1.5px dashed #9a958a; background:
      repeating-linear-gradient(135deg, transparent 0 9px, rgba(0,0,0,.04) 9px 10px);
    color:#7a756a; display:flex; align-items:center; justify-content:center;
    font-family:'Gaegu', cursive; font-size:13px; letter-spacing:.02em;
    border-radius:3px;
  }
  .scribble { font-family:'Gaegu', cursive; color:#6b6357; }
  .pen { font-family:'Nanum Pen Script', cursive; }

  /* the hand-drawn underline used on some headings */
  .uline { position:relative; display:inline-block; }
  .uline::after {
    content:""; position:absolute; left:-2px; right:-2px; bottom:-3px; height:6px;
    background: var(--ink, #1c1c1c);
    -webkit-mask: radial-gradient(8px 6px at 50% 0%, #000 99%, transparent) 0 0/16px 6px repeat-x;
            mask: radial-gradient(8px 6px at 50% 0%, #000 99%, transparent) 0 0/16px 6px repeat-x;
    opacity:.7;
  }

  /* tiny annotation arrows scattered around the canvas */
  .annot {
    position:absolute; font-family:'Gaegu', cursive; color:#5b544a;
    font-size:13px; line-height:1.25; max-width:180px;
  }
  .annot svg { display:block; }

  /* mobile artboard chrome */
  .phone {
    width:100%; height:100%; background:var(--bg,#fafaf7); position:relative;
    overflow:hidden; display:flex; flex-direction:column;
    color:var(--ink,#1c1c1c); font-size:12px;
  }
  .statusbar {
    height:22px; padding:0 16px; display:flex; align-items:center;
    justify-content:space-between; font-family:'Pretendard', system-ui;
    font-size:10.5px; color:var(--ink,#1c1c1c); opacity:.75; flex:0 0 auto;
  }
  .scroll { flex:1 1 auto; overflow:hidden; }

  /* utility */
  .row { display:flex; }
  .col { display:flex; flex-direction:column; }
  .gap-4 { gap:4px; } .gap-6 { gap:6px; } .gap-8 { gap:8px; } .gap-10 { gap:10px; } .gap-12 { gap:12px; } .gap-16 { gap:16px; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect, TweakColor } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": [
    "#1f1c18",
    "#cfc9be",
    "#a08152",
    "#f4f1ea"
  ],
  "header": "tabs",
  "font": "pretendard"
}/*EDITMODE-END*/;

const PALETTES = [
  ["#1f1c18", "#cfc9be", "#a08152", "#f4f1ea"],
  ["#171717", "#d6d4cf", "#5d6f5b", "#f1efe9"],
  ["#13171c", "#cfd2d8", "#5b6f8a", "#eef0f3"],
  ["#1a1a1a", "#cfcfcf", "#1a1a1a", "#fafafa"],
  ["#1f1a14", "#dcd3c3", "#7c5a3a", "#ebe3d4"],
];

const FONT_PAIRS = {
  pretendard: { head: '"Pretendard", system-ui, sans-serif',  body: '"Pretendard", system-ui, sans-serif',  label: "Pretendard 단일 (모던 산세)" },
  gowundodum: { head: '"Gowun Dodum", system-ui, sans-serif', body: '"Gowun Dodum", system-ui, sans-serif', label: "Gowun Dodum (부드러운 산세)" },
  gaegu:      { head: '"Gaegu", "Pretendard", cursive',       body: '"Pretendard", system-ui, sans-serif',  label: "Gaegu (제목) + Pretendard (본문)" },
  serif:      { head: '"Noto Serif KR", serif',               body: '"Noto Sans KR", sans-serif',           label: "Noto Serif KR + Noto Sans KR" },
  plex:       { head: '"IBM Plex Sans KR", sans-serif',       body: '"IBM Plex Sans KR", sans-serif',       label: "IBM Plex Sans KR (정갈한 산세)" },
};

const HEADER_OPTS = [
  { value: "hamburger", label: "햄버거" },
  { value: "tabs",      label: "상단 탭" },
  { value: "bottomnav", label: "하단 네비" },
];

function BottomBar({ ink, mute, accent, bg, current }) {
  const items = [
    { l:"수련회 정보", k:"수련회 정보" },
    { l:"굿즈", k:"굿즈" },
    { l:"FAQ/공지", k:"FAQ/공지" },
  ];
  return (
    <div style={{
      position:"absolute", left:0, right:0, bottom:0, height:54,
      background:bg, borderTop:`1px solid ${mute}`,
      display:"flex", alignItems:"stretch", zIndex:5,
    }}>
      {items.map(it => {
        const on = it.k === current;
        return (
          <div key={it.k} style={{
            flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4,
            color: ink, opacity: on ? 1 : .45,
          }}>
            <div style={{
              width:14, height:14, borderRadius:3,
              border:`1.5px solid ${on?accent:ink}`,
              background: on ? accent : "transparent",
            }}/>
            <div style={{fontSize:9.5, fontWeight: on?600:400, letterSpacing:".02em"}}>{it.l}</div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [ink, mute, accent, bg] = t.palette;
  const fp = FONT_PAIRS[t.font] || FONT_PAIRS.pretendard;
  const showBottom = t.header === "bottomnav";

  const renderScreen = (Comp, current) => (
    <div style={{ width:"100%", height:"100%", position:"relative", "--font-head": fp.head, "--font-body": fp.body, fontFamily: fp.body }}>
      <Comp ink={ink} mute={mute} accent={accent} bg={bg} header={showBottom ? "hamburger" : t.header}/>
      {showBottom && <BottomBar ink={ink} mute={mute} accent={accent} bg={bg} current={current}/>}
    </div>
  );

  const variations = [
    { key:"A", section:"a-quiet" },
    { key:"B", section:"b-mag" },
    { key:"C", section:"c-tabs" },
    { key:"D", section:"d-spine" },
    { key:"E", section:"e-bento" },
  ];

  return (
    <div style={{fontFamily: fp.body}}>
      <DesignCanvas>
        <div style={{padding:"6px 12px 18px", maxWidth:1100}}>
          <div style={{fontSize:11, letterSpacing:".22em", color:"#8a8170", fontWeight:600}}>WIREFRAMES · v1</div>
          <div style={{fontSize:30, fontWeight:600, letterSpacing:"-.02em", marginTop:4, color:"#2a251f"}}>교회 수련회 웹사이트</div>
          <div style={{fontSize:13, marginTop:8, color:"#5b544a", lineHeight:1.55, maxWidth:640}}>
            5가지 레이아웃 방향을 모바일 기준 정보 / 굿즈 / FAQ 화면으로 비교합니다.
            로고·포스터·굿즈 이미지는 <span style={{fontFamily:'"Gaegu", cursive'}}>대시 박스 placeholder</span>로 들어갑니다 — 추후 자산 교체 가능.
            우측 하단 <b>Tweaks</b> 패널에서 컬러 / 헤더 / 폰트를 동시에 바꿔보세요.
          </div>
        </div>

        {variations.map(({key, section}) => {
          const V = window.RETREAT[key];
          return (
            <DCSection key={section} id={section} title={`${key} · ${V.name}`} subtitle={V.note}>
              <DCArtboard id={`${section}-info`}  label="① 수련회 정보" width={360} height={780}>
                {renderScreen(V.Info, "수련회 정보")}
              </DCArtboard>
              <DCArtboard id={`${section}-goods`} label="② 자체 제작 굿즈" width={360} height={780}>
                {renderScreen(V.Goods, "굿즈")}
              </DCArtboard>
              <DCArtboard id={`${section}-faq`}   label="③ FAQ / 공지사항" width={360} height={780}>
                {renderScreen(V.Faq, "FAQ/공지")}
              </DCArtboard>
            </DCSection>
          );
        })}
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="컬러 팔레트"/>
        <TweakColor
          label="팔레트"
          value={t.palette}
          options={PALETTES}
          onChange={(v) => setTweak("palette", v)}
        />
        <TweakSection label="헤더 / 네비"/>
        <TweakRadio
          label="네비게이션"
          value={t.header}
          options={HEADER_OPTS}
          onChange={(v) => setTweak("header", v)}
        />
        <TweakSection label="타이포그래피"/>
        <TweakSelect
          label="폰트 페어링"
          value={t.font}
          options={Object.keys(FONT_PAIRS).map(k => ({ value: k, label: FONT_PAIRS[k].label }))}
          onChange={(v) => setTweak("font", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
