<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>2025 수련회 — 차분한 스크롤</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<style>
:root {
  --ink:#1f1c18; --mute:#cfc9be; --accent:#a08152; --bg:#f4f1ea;
  --fh:'Pretendard',system-ui,sans-serif; --fb:'Pretendard',system-ui,sans-serif;
  --max:1060px; --p:clamp(18px,4vw,40px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--ink);font-family:var(--fb);-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* ── nav ── */
.nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--mute)}
.nav-in{max-width:var(--max);margin:0 auto;padding:0 var(--p);display:flex;align-items:stretch;justify-content:space-between;gap:8px}
.brand{font-size:13px;font-weight:600;letter-spacing:.06em;display:flex;align-items:center;padding:14px 0;white-space:nowrap}
.tabs{display:flex;align-items:stretch}
.tab{padding:0 16px;font-size:13.5px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;opacity:.5;transition:opacity .15s,border-color .15s;white-space:nowrap}
.tab.on{border-bottom-color:var(--ink);opacity:1;font-weight:600}
.cta-btn{margin:auto 0;padding:8px 18px;background:var(--ink);color:var(--bg);border-radius:999px;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;font-family:var(--fb)}

/* ── layout ── */
.page{max-width:var(--max);margin:0 auto;padding:0 var(--p)}
.sec{padding:52px 0;border-bottom:1px solid var(--mute)}
.sec:last-child{border-bottom:none;padding-bottom:96px}
.lbl{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;color:var(--accent);margin-bottom:10px}
.h2{font-size:clamp(20px,2.5vw,28px);font-weight:500;letter-spacing:-.02em;font-family:var(--fh);margin-bottom:20px}

/* ── hero ── */
.hero{display:grid;grid-template-columns:1fr 44%;gap:clamp(24px,5vw,64px);padding:clamp(40px,7vw,80px) 0;border-bottom:1px solid var(--mute)}
.hero-eyebrow{font-size:11px;letter-spacing:.22em;font-weight:600;color:var(--accent);text-transform:uppercase;margin-bottom:16px}
.hero-title{font-size:clamp(64px,12vw,120px);font-weight:500;line-height:.88;letter-spacing:-.04em;font-family:var(--fh)}
.hero-sub{margin-top:20px;font-size:clamp(13.5px,1.5vw,15.5px);line-height:1.65;opacity:.75}
.hero-meta{display:flex;gap:28px;flex-wrap:wrap;margin-top:22px;padding-top:18px;border-top:1px solid var(--mute)}
.meta-item label{display:block;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;opacity:.5;margin-bottom:4px}
.meta-item span{font-size:14px;font-weight:500}
.poster-ph{width:100%;aspect-ratio:3/4;max-height:520px;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);color:#9a958a;font-size:13px;border-radius:3px}

/* ── verse ── */
.verse{padding:24px 28px;border-left:3px solid var(--accent)}
.verse p{font-size:clamp(15px,1.8vw,18.5px);line-height:1.7;opacity:.88}
.verse cite{display:block;font-size:13px;opacity:.5;margin-top:8px;font-style:normal}

/* ── schedule ── */
.day-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.day-card{border:1px solid var(--mute);padding:22px 18px}
.day-tag{font-size:10px;letter-spacing:.18em;font-weight:600;color:var(--accent)}
.day-date{font-size:12.5px;opacity:.55;margin-top:3px}
.day-title{font-size:20px;font-weight:500;margin:10px 0 12px;font-family:var(--fh);letter-spacing:-.01em}
.time-row{display:grid;grid-template-columns:52px 1fr;gap:6px;padding:8px 0;border-bottom:1px solid var(--mute);font-size:12.5px;align-items:start}
.time-row:last-child{border-bottom:none}
.time-row .t{font-family:ui-monospace,monospace;opacity:.55}

/* ── map ── */
.map-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:clamp(16px,4vw,40px);align-items:start}
.map-ph{aspect-ratio:4/3;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);color:#9a958a;font-size:13px;border-radius:3px}
.map-info{display:flex;flex-direction:column;gap:12px}
.map-addr{font-size:14px;line-height:1.6;opacity:.7}
.transport{display:flex;flex-direction:column;gap:8px}
.t-item{display:flex;gap:10px;font-size:13.5px;align-items:baseline}
.t-badge{font-size:10px;font-weight:600;letter-spacing:.08em;padding:2px 7px;border:1px solid var(--mute);flex-shrink:0}

/* ── chips ── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:6px 14px;border:1px solid var(--ink);border-radius:999px;font-size:13px}

/* ── teams ── */
.teams{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.team{border:1px solid var(--mute);padding:16px 14px}
.team-n{font-size:26px;font-weight:500;line-height:1;font-family:var(--fh)}
.team-l{font-size:11.5px;opacity:.5;margin-top:5px}

/* ── register ── */
.reg{display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,5vw,52px);padding:clamp(28px,5vw,48px);background:var(--ink);color:var(--bg)}
.reg-lbl{font-size:10px;letter-spacing:.22em;opacity:.6}
.reg-title{font-size:clamp(24px,4vw,38px);font-weight:500;letter-spacing:-.02em;font-family:var(--fh);margin:8px 0 10px}
.reg-note{font-size:13px;opacity:.55;line-height:1.55}
.reg-form{display:flex;flex-direction:column;gap:10px}
.reg-in{height:42px;padding:0 14px;font-size:13.5px;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--bg);border-radius:3px;outline:none;font-family:var(--fb)}
.reg-in::placeholder{opacity:.4}
.reg-sub{height:42px;background:var(--bg);color:var(--ink);border:none;font-weight:600;font-size:14px;cursor:pointer;font-family:var(--fb);letter-spacing:.02em}

/* ── goods ── */
.goods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(14px,3vw,28px)}
.goods-ph{aspect-ratio:1;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);color:#9a958a;font-size:12px;margin-bottom:10px}
.goods-name{font-size:15px;font-weight:500}
.goods-opt{font-size:12.5px;opacity:.5;margin-top:3px}

/* ── faq ── */
.faq-item{border-bottom:1px solid var(--mute)}
.faq-q{display:flex;justify-content:space-between;gap:16px;padding:18px 0;cursor:pointer;font-size:15px;font-weight:500;align-items:center}
.faq-icon{opacity:.4;font-size:18px;flex-shrink:0;line-height:1}
.faq-a{padding-bottom:16px;font-size:14px;line-height:1.7;opacity:.72}
.notice-item{display:grid;grid-template-columns:1fr 60px;gap:16px;padding:16px 0;border-bottom:1px solid var(--mute);align-items:center}
.notice-pin{font-size:10.5px;font-weight:600;color:var(--accent);letter-spacing:.1em;margin-bottom:3px}
.notice-title{font-size:14px;line-height:1.4}
.notice-date{font-size:11.5px;opacity:.5;font-family:ui-monospace,monospace;text-align:right}

/* ── responsive ── */
@media(max-width:760px){
  .hero{grid-template-columns:1fr}
  .hero-img-wrap{order:-1}
  .poster-ph{aspect-ratio:16/9;max-height:220px}
  .day-grid{grid-template-columns:1fr}
  .map-grid{grid-template-columns:1fr}
  .reg{grid-template-columns:1fr}
  .goods-grid{grid-template-columns:repeat(2,1fr)}
  .cta-btn{display:none}
  .tab{padding:0 10px;font-size:12.5px}
}
@media(max-width:480px){
  .teams{grid-template-columns:repeat(3,1fr)}
  .tab{font-size:12px;padding:0 8px}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const {useState,useEffect} = React;

const DAYS=[
  {tag:"DAY 01",date:"11.14 (금)",title:"환영·시작",rows:[["17:00","도착·방 배정"],["19:00","저녁 식사"],["20:30","개회 예배·첫 말씀"],["22:30","조모임"]]},
  {tag:"DAY 02",date:"11.15 (토)",title:"깊이·나눔",rows:[["07:00","경건회"],["09:30","둘째 말씀"],["13:00","팀 액티비티"],["19:30","찬양의 밤"]]},
  {tag:"DAY 03",date:"11.16 (일)",title:"결단·폐회",rows:[["08:30","주일 예배"],["11:30","폐회·점심"],["13:00","해산"]]},
];
const GOODS=[

const FAQS=[
  {q:"참가비는 얼마인가요?",a:"참가비는 무료입니다. 모든 숙식·강의·굿즈 비용은 교회 예산과 후원으로 충당됩니다."},

  {title:"조 편성 안내 (1~8조)",date:"11.05"},

  {title:"2차 사전 모임 안내 (10.26 주일 1부 후)",date:"10.20"},

  const [t,setTweak]=useTweaks(TWEAK_DEFAULTS);

    </nav>

    {tab==="info" && <div className="page">

          <div className="hero-sub">"수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라"<br/>— 마태복음 11:28</div>

          </div>
        </div>
        <div className="hero-img-wrap"><div className="poster-ph">포스터</div></div>

        <div className="day-grid">

              <div className="day-tag">{tag}</div>
              <div className="day-date">{date}</div>

              <div>{rows.map(([t,n])=><div className="time-row" key={t}><span className="t">{t}</span><span>{n}</span></div>)}</div>

      </div>

      <div className="sec">

            <input className="reg-in" placeholder="소속 부서 / 셀"/>
            <button className="reg-sub" type="submit" style={{background:bg,color:ink,fontFamily:fp.b}}>신청서 제출하기</button>

        </div>
      </div>

    {tab==="goods" && <div className="page">
      <div className="sec">

        <div className="goods-grid">
          {GOODS.map(({n,o})=>(
            <div key={n}>
              <div className="goods-ph">{n}</div>
              <div className="goods-name">{n}</div>
              <div className="goods-opt">{o}</div>
            </div>
          ))}
        </div>
      </div>
    </div>}

    {tab==="faq" && <div className="page">
      <div className="sec">
        <div className="lbl">자주 묻는 질문</div>
        <div className="h2" style={{fontFamily:fp.h,marginBottom:0}}>FAQ</div>
        {FAQS.map(({q,a},i)=>(
          <div className="faq-item" key={i}>
            <div className="faq-q" onClick={()=>setOpenFaq(openFaq===i?null:i)}>
              <span>Q. {q}</span>
              <span className="faq-icon">{openFaq===i?"−":"+"}</span>
            </div>
            {openFaq===i && <div className="faq-a">{a}</div>}
          </div>
        ))}
      </div>
      <div className="sec">
        <div className="lbl">공지사항</div>
        {NOTICES.map(({pin,title,date},i)=>(
          <div className="notice-item" key={i}>
            <div>
              {pin && <div className="notice-pin" style={{color:accent}}>📌 NOTICE</div>}
              <div className="notice-title" style={{fontWeight:pin?500:400}}>{title}</div>
            </div>
            <div className="notice-date">{date}</div>
          </div>
        ))}
      </div>
    </div>}

    <TweaksPanel title="Tweaks">
      <TweakSection label="컬러 팔레트"/>
      <TweakColor label="팔레트" value={t.palette} options={PALETTES} onChange={v=>setTweak("palette",v)}/>
      <TweakSection label="타이포그래피"/>
      <TweakSelect label="폰트" value={t.font}
        options={Object.keys(FONTS).map(k=>({value:k,label:FONTS[k].l}))}
        onChange={v=>setTweak("font",v)}/>
    </TweaksPanel>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
