<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>2025 수련회 — 매거진 그리드</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<style>
:root{
  --ink:#1f1c18;--mute:#cfc9be;--accent:#a08152;--bg:#f4f1ea;
  --fh:'Pretendard',system-ui,sans-serif;--fb:'Pretendard',system-ui,sans-serif;
  --max:1080px;--p:clamp(18px,4vw,44px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--ink);font-family:var(--fb);-webkit-font-smoothing:antialiased}

/* ── masthead bar ── */
.masthead{border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);
  padding:6px var(--p);display:flex;justify-content:space-between;align-items:center;
  font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;
  position:sticky;top:0;z-index:100;background:var(--bg)}
.mh-brand{font-size:13px;letter-spacing:.06em}
.mh-tabs{display:flex;gap:0}
.mh-tab{padding:5px 14px;cursor:pointer;opacity:.45;transition:opacity .15s;letter-spacing:.14em;font-size:10.5px}
.mh-tab.on{opacity:1;border-bottom:1.5px solid var(--ink)}
.mh-issue{opacity:.45}

/* ── page ── */
.page{max-width:var(--max);margin:0 auto;padding:0 var(--p)}

/* ── hero ── */
.hero{padding:clamp(32px,6vw,72px) 0 0;border-bottom:2px solid var(--ink)}
.hero-kicker{display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px solid var(--ink);padding-bottom:8px;margin-bottom:clamp(20px,4vw,36px);
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;opacity:.6}
.hero-grid{display:grid;grid-template-columns:1fr 42%;gap:clamp(24px,5vw,56px);padding-bottom:clamp(28px,5vw,52px)}
.hero-left{}
.hero-num{font-size:clamp(80px,14vw,160px);font-weight:400;line-height:.85;letter-spacing:-.05em;
  font-family:var(--fh);margin-bottom:10px}
.hero-sub-title{font-size:clamp(18px,3vw,30px);font-weight:500;letter-spacing:-.02em;
  font-family:var(--fh);margin-bottom:clamp(14px,2vw,22px)}
.hero-body{font-size:clamp(13.5px,1.5vw,15px);line-height:1.7;opacity:.75;max-width:480px}
.hero-meta{display:flex;gap:0;margin-top:clamp(20px,4vw,36px);border-top:1px solid var(--mute)}
.m-item{flex:1;padding:16px 0;border-right:1px solid var(--mute)}
.m-item:last-child{border-right:none}
.m-item label{display:block;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;opacity:.45;margin-bottom:6px}
.m-item span{font-size:15px;font-weight:500}
.hero-right{display:flex;flex-direction:column;gap:12px}
.ph-main{flex:1;min-height:340px;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);
  color:#9a958a;font-size:12.5px}
.ph-sm{aspect-ratio:2/1;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);
  color:#9a958a;font-size:12px}

/* ── rule ── */
.rule{display:flex;align-items:baseline;gap:14px;padding:clamp(28px,5vw,52px) 0 clamp(18px,3vw,32px)}
.rule-num{font-size:clamp(36px,6vw,64px);font-weight:400;line-height:1;letter-spacing:-.04em;font-family:var(--fh);opacity:.18}
.rule-label{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;color:var(--accent)}
.rule::before{content:"";display:block;flex:1;height:1px;background:var(--ink);margin-bottom:4px}

/* ── verse ── */
.verse-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,5vw,56px);padding-bottom:clamp(28px,5vw,52px);border-bottom:1px solid var(--mute)}
.verse-q{font-size:clamp(20px,3vw,32px);font-weight:400;line-height:1.45;font-family:var(--fh);opacity:.92;letter-spacing:-.01em}
.verse-side{display:flex;flex-direction:column;justify-content:flex-end;gap:16px}
.verse-ref{font-size:13px;opacity:.55}

/* ── days ── */
.days-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--ink);margin-bottom:clamp(28px,5vw,52px)}
.day-col{padding:24px 20px;border-right:1px solid var(--ink)}
.day-col:last-child{border-right:none}
.day-n{font-size:clamp(38px,6vw,68px);font-weight:400;line-height:.9;letter-spacing:-.04em;font-family:var(--fh);opacity:.15;margin-bottom:4px}
.day-tag{font-size:10px;letter-spacing:.2em;font-weight:600;color:var(--accent);text-transform:uppercase}
.day-date{font-size:12px;opacity:.55;margin:4px 0 14px}
.day-title{font-size:18px;font-weight:500;letter-spacing:-.01em;font-family:var(--fh);margin-bottom:12px}
.time-row{display:grid;grid-template-columns:52px 1fr;gap:6px;padding:7px 0;border-top:1px solid var(--mute);font-size:12.5px}
.time-row .t{font-family:ui-monospace,monospace;opacity:.55}

/* ── map ── */
.map-edit{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,5vw,56px);padding-bottom:clamp(28px,5vw,52px);border-bottom:1px solid var(--mute)}
.map-ph{aspect-ratio:4/3;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);color:#9a958a;font-size:13px}
.map-side{display:flex;flex-direction:column;justify-content:center;gap:12px}
.map-place{font-size:clamp(20px,2.8vw,28px);font-weight:500;font-family:var(--fh);letter-spacing:-.01em}
.map-addr{font-size:13.5px;opacity:.65;line-height:1.6}
.t-row{display:flex;gap:10px;font-size:13px;align-items:baseline;margin-top:4px}
.t-badge{font-size:9.5px;font-weight:600;letter-spacing:.08em;padding:2px 7px;border:1px solid var(--mute);flex-shrink:0}

/* ── chips ── */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:clamp(28px,5vw,52px)}
.chip{padding:6px 14px;border:1px solid var(--mute);font-size:13px}

/* ── teams ── */
.teams-edit{display:grid;grid-template-columns:repeat(8,1fr);gap:0;border:1px solid var(--mute);margin-bottom:clamp(28px,5vw,52px)}
.team-col{padding:14px 10px;border-right:1px solid var(--mute);text-align:center}
.team-col:last-child{border-right:none}
.team-big{font-size:28px;font-weight:400;line-height:1;font-family:var(--fh);opacity:.25}
.team-lbl{font-size:11px;font-weight:500;margin-top:4px}
.team-sub{font-size:10px;opacity:.45;margin-top:2px}

/* ── register ── */
.reg-edit{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,5vw,56px);
  padding:clamp(28px,5vw,52px);background:var(--ink);color:var(--bg);margin-bottom:80px}
.reg-caption{font-size:10px;letter-spacing:.22em;opacity:.6;margin-bottom:8px}
.reg-head{font-size:clamp(28px,5vw,52px);font-weight:400;font-family:var(--fh);letter-spacing:-.03em;line-height:.95;margin-bottom:16px}
.reg-note{font-size:13px;opacity:.55;line-height:1.6}
.reg-form{display:flex;flex-direction:column;justify-content:center;gap:10px}
.reg-in{height:42px;padding:0 14px;font-size:13.5px;border:1px solid rgba(255,255,255,.2);
  background:transparent;color:var(--bg);font-family:var(--fb);outline:none}
.reg-in::placeholder{opacity:.4}
.reg-sub{height:42px;background:var(--bg);color:var(--ink);border:none;
  font-weight:600;font-size:14px;cursor:pointer;font-family:var(--fb);letter-spacing:.02em}

/* ── goods ── */
.goods-mast{border-top:3px solid var(--ink);padding:6px 0;
  display:flex;justify-content:space-between;margin-bottom:clamp(24px,4vw,44px);
  font-size:10px;letter-spacing:.2em;font-weight:600;text-transform:uppercase;opacity:.6}
.goods-hero{display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,4vw,40px);margin-bottom:clamp(24px,4vw,44px)}
.g-hero-ph{aspect-ratio:3/4;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);color:#9a958a;font-size:13px}
.g-side{display:flex;flex-direction:column;justify-content:flex-end;gap:10px}
.g-num{font-size:clamp(54px,10vw,100px);font-weight:400;line-height:.85;letter-spacing:-.05em;font-family:var(--fh);opacity:.12}
.g-name{font-size:clamp(22px,4vw,38px);font-weight:500;letter-spacing:-.02em;font-family:var(--fh)}
.g-opt{font-size:13px;opacity:.55}
.goods-sub{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(10px,2vw,20px);margin-bottom:80px}
.goods-item-ph{aspect-ratio:1;border:1.5px dashed var(--mute);display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);color:#9a958a;font-size:11.5px;margin-bottom:8px}
.g-item-num{font-size:9.5px;letter-spacing:.18em;opacity:.4;margin-bottom:3px}
.g-item-name{font-size:15px;font-weight:500}
.g-item-opt{font-size:12px;opacity:.5;margin-top:2px}

/* ── faq ── */
.faq-mast{border-top:3px solid var(--ink);padding:6px 0;
  display:flex;justify-content:space-between;margin-bottom:clamp(24px,4vw,44px);
  font-size:10px;letter-spacing:.2em;font-weight:600;text-transform:uppercase;opacity:.6}
.faq-tabs{display:flex;gap:28px;border-bottom:1px solid var(--ink);
  padding-bottom:0;margin-bottom:clamp(24px,4vw,44px)}
.faq-tab{padding-bottom:10px;font-size:13.5px;cursor:pointer;opacity:.4;
  border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:400}
.faq-tab.on{opacity:1;border-bottom-color:var(--ink);font-weight:600}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:80px}
.faq-item{padding:clamp(18px,3vw,28px) 0;border-bottom:1px solid var(--mute)}
.faq-item:nth-child(odd){padding-right:clamp(16px,4vw,48px);border-right:1px solid var(--mute)}
.faq-item:nth-child(even){padding-left:clamp(16px,4vw,48px)}
.faq-n{font-size:clamp(28px,5vw,52px);font-weight:400;letter-spacing:-.03em;opacity:.1;font-family:var(--fh);line-height:1}
.faq-q{font-size:clamp(13.5px,1.6vw,16px);font-weight:500;margin:6px 0 8px;line-height:1.4}
.faq-a{font-size:13px;opacity:.65;line-height:1.65}
.notice-row{display:grid;grid-template-columns:1fr 70px;gap:16px;
  padding:16px 0;border-bottom:1px solid var(--mute);align-items:center}
.notice-pin{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--accent);margin-bottom:3px}
.notice-t{font-size:14px}
.notice-d{font-size:11.5px;opacity:.5;font-family:ui-monospace,monospace;text-align:right}

/* ── responsive ── */
@media(max-width:760px){
  .hero-grid{grid-template-columns:1fr}
  .hero-right{flex-direction:row}
  .ph-main{min-height:220px}
  .verse-grid{grid-template-columns:1fr}
  .days-grid{grid-template-columns:1fr}
  .day-col{border-right:none;border-bottom:1px solid var(--ink)}
  .day-col:last-child{border-bottom:none}
  .map-edit{grid-template-columns:1fr}
  .teams-edit{grid-template-columns:repeat(4,1fr)}
  .reg-edit{grid-template-columns:1fr}
  .goods-hero{grid-template-columns:1fr}
  .goods-sub{grid-template-columns:repeat(2,1fr)}
  .faq-grid{grid-template-columns:1fr}
  .faq-item:nth-child(odd){padding-right:0;border-right:none}
  .faq-item:nth-child(even){padding-left:0}
}
@media(max-width:480px){
  .teams-edit{grid-template-columns:repeat(4,1fr)}
  .goods-sub{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const {TweaksPanel,useTweaks,TweakSection,TweakColor,TweakSelect}=window;

const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{"palette":["#1f1c18","#cfc9be","#a08152","#f4f1ea"],"font":"pretendard"}/*EDITMODE-END*/;
const PALETTES=[["#1f1c18","#cfc9be","#a08152","#f4f1ea"],["#171717","#d6d4cf","#5d6f5b","#f1efe9"],["#13171c","#cfd2d8","#5b6f8a","#eef0f3"],["#1a1a1a","#cfcfcf","#1a1a1a","#fafafa"],["#1f1a14","#dcd3c3","#7c5a3a","#ebe3d4"]];
const FONTS={pretendard:{h:'"Pretendard",system-ui,sans-serif',b:'"Pretendard",system-ui,sans-serif',l:"Pretendard"},gowundodum:{h:'"Gowun Dodum",system-ui,sans-serif',b:'"Gowun Dodum",system-ui,sans-serif',l:"Gowun Dodum"},serif:{h:'"Noto Serif KR",serif',b:'"Noto Sans KR",sans-serif',l:"Noto Serif KR"},plex:{h:'"IBM Plex Sans KR",sans-serif',b:'"IBM Plex Sans KR",sans-serif',l:"IBM Plex Sans KR"}};

const DAYS=[
  {n:"01",tag:"DAY 01",date:"11.14 (금)",title:"환영·시작",rows:[["17:00","도착·방 배정"],["19:00","저녁 식사"],["20:30","개회 예배·첫 말씀"],["22:30","조모임"]]},
  {n:"02",tag:"DAY 02",date:"11.15 (토)",title:"깊이·나눔",rows:[["07:00","경건회"],["09:30","둘째 말씀"],["13:00","팀 액티비티"],["19:30","찬양의 밤"]]},
  {n:"03",tag:"DAY 03",date:"11.16 (일)",title:"결단·폐회",rows:[["08:30","주일 예배"],["11:30","폐회·점심"],["13:00","해산"]]},
];
const FAQS=[
  {q:"참가비는 얼마인가요?",a:"무료입니다. 모든 비용은 교회 예산과 후원으로 충당됩니다."},
  {q:"식사는 모두 제공되나요?",a:"조식·중식·석식 모두 무료 제공됩니다."},
  {q:"가족도 참가 가능한가요?",a:"성인 교인 및 그 가족은 함께 신청 가능합니다."},
  {q:"환불은 가능한가요?",a:"무료 행사이므로 별도 환불은 없습니다."},
  {q:"처음이라도 괜찮을까요?",a:"물론입니다! 처음 오시는 분을 위한 시간도 준비했어요."},
  {q:"굿즈는 언제 받나요?",a:"수련회 당일 리셉션 데스크에서 수령하실 수 있습니다."},
];
const NOTICES=[
  {pin:true,title:"[필독] 출발 시간이 16:30으로 변경되었습니다",date:"11.10"},
  {title:"조 편성 안내 (1~8조)",date:"11.05"},
  {title:"숙소 배정 및 룸메이트 안내",date:"11.04"},
  {title:"준비물 안내 — 11월 양평 날씨 참고",date:"10.30"},
  {title:"2차 사전 모임 안내",date:"10.20"},
];

function App(){
  const [t,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const [tab,setTab]=useState("info");
  const [faqTab,setFaqTab]=useState("faq");
  const [ink,mute,accent,bg]=t.palette;
  const fp=FONTS[t.font]||FONTS.pretendard;

  useEffect(()=>{
    const s=document.documentElement.style;
    s.setProperty("--ink",ink);s.setProperty("--mute",mute);
    s.setProperty("--accent",accent);s.setProperty("--bg",bg);
    s.setProperty("--fh",fp.h);s.setProperty("--fb",fp.b);
    document.body.style.background=bg;
  },[ink,mute,accent,bg,fp]);

  return(<>
    {/* ── masthead nav ── */}
    <div className="masthead" style={{background:bg}}>
      <div className="mh-brand">○○교회 · 2025 수련회</div>
      <div className="mh-tabs">
        {[["info","정보"],["goods","굿즈"],["faq","FAQ"]].map(([k,l])=>(
          <div key={k} className={"mh-tab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>
      <div className="mh-issue">ISSUE 02 · 가을</div>
    </div>

    {tab==="info" && <div className="page">
      <div className="hero">
        <div className="hero-kicker">
          <span>2025 가을 수련회</span><span>특집 · 쉼과 회복</span><span>주제 말씀: 마태복음 11:28</span>
        </div>
        <div className="hero-grid">
          <div>
            <div className="hero-num" style={{fontFamily:fp.h}}>REST.</div>
            <div className="hero-sub-title" style={{fontFamily:fp.h}}>쉼, 다시 시작하기 위하여</div>
            <div className="hero-body">"수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라." 이번 수련회의 주제는 '쉼'입니다. 바쁜 일상 가운데 하나님 앞에 나아가 진정한 쉼을 경험하는 시간이 되기를 기대합니다.</div>
            <div className="hero-meta">
              {[["DATE","11.14 — 11.16"],["PLACE","양평 ○○수양관"],["기간","2박 3일"],["신청마감","11.07 (금)"]].map(([lbl,val])=>(
                <div className="m-item" key={lbl}><label>{lbl}</label><span>{val}</span></div>
              ))}
            </div>
          </div>
          <div className="hero-right">
            <div className="ph-main">MAIN POSTER</div>
            <div className="ph-sm">현장 이미지</div>
          </div>
        </div>
      </div>

      {/* 주제 말씀 */}
      <div className="rule" style={{"--before-bg":ink}}>
        <div className="rule-num" style={{fontFamily:fp.h}}>01</div>
        <div className="rule-label">주제 말씀</div>
      </div>
      <div className="verse-grid">
        <div className="verse-q" style={{fontFamily:fp.h}}>
          "수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라 나는 마음이 온유하고 겸손하니 나의 멍에를 메고 내게 배우라"
        </div>
        <div className="verse-side">
          <div style={{fontSize:13,opacity:.55,lineHeight:1.6}}>이번 수련회의 모든 순서는 이 말씀을 중심으로 구성되었습니다. 말씀을 통해 진정한 쉼의 의미를 발견하는 시간이 되길 소망합니다.</div>
          <div className="verse-ref">— 마태복음 11:28–29</div>
        </div>
      </div>

      {/* 일정 */}
      <div className="rule">
        <div className="rule-num" style={{fontFamily:fp.h}}>02</div>
        <div className="rule-label">전체 일정</div>
      </div>
      <div className="days-grid" style={{borderColor:ink}}>
        {DAYS.map(({n,tag,date,title,rows})=>(
          <div className="day-col" key={n} style={{borderRightColor:ink}}>
            <div className="day-n" style={{fontFamily:fp.h}}>{n}</div>
            <div className="day-tag" style={{color:accent}}>{tag}</div>
            <div className="day-date">{date}</div>
            <div className="day-title" style={{fontFamily:fp.h}}>{title}</div>
            {rows.map(([time,name])=>(
              <div className="time-row" key={time} style={{borderTopColor:mute}}>
                <span className="t">{time}</span><span>{name}</span>
              </div>
            ))}
          </div>
        ))}
      </div>

      {/* 장소 */}
      <div className="rule">
        <div className="rule-num" style={{fontFamily:fp.h}}>03</div>
        <div className="rule-label">오시는 길</div>
      </div>
      <div className="map-edit">
        <div className="map-ph">지도</div>
        <div className="map-side">
          <div className="map-place" style={{fontFamily:fp.h}}>양평 ○○수양관</div>
          <div className="map-addr">경기도 양평군 ○○면 ○○리 123-4</div>
          <div>
            {[["버스","교회 → 수양관 단체 버스"],["자가용","중부고속도로 → 양평IC"],["대중교통","청량리역 → ITX → 양평역"]].map(([b,d])=>(
              <div className="t-row" key={b}><span className="t-badge" style={{borderColor:mute}}>{b}</span><span style={{opacity:.7,fontSize:13}}>{d}</span></div>
            ))}
          </div>
        </div>
      </div>

      {/* 준비물 */}
      <div className="rule">
        <div className="rule-num" style={{fontFamily:fp.h}}>04</div>
        <div className="rule-label">준비물</div>
      </div>
      <div className="chips">
        {["성경","개인 컵","세면도구","편한 옷 3벌","필기구","담요","개인 약","건강보험증","현금 소액"].map(c=>(
          <span className="chip" key={c} style={{borderColor:mute}}>{c}</span>
        ))}
      </div>

      {/* 조 편성 */}
      <div className="rule">
        <div className="rule-num" style={{fontFamily:fp.h}}>05</div>
        <div className="rule-label">조 편성</div>
      </div>
      <div className="teams-edit" style={{borderColor:mute}}>
        {Array.from({length:8},(_,i)=>(
          <div className="team-col" key={i} style={{borderRightColor:mute}}>
            <div className="team-big" style={{fontFamily:fp.h}}>{i+1}</div>
            <div className="team-lbl">{i+1}조</div>
            <div className="team-sub">조장 미정</div>
          </div>
        ))}
      </div>

      {/* 신청 */}
      <div className="rule">
        <div className="rule-num" style={{fontFamily:fp.h}}>06</div>
        <div className="rule-label">참가 신청</div>
      </div>
      <div className="reg-edit" style={{background:ink,color:bg}}>
        <div>
          <div className="reg-caption">REGISTER NOW</div>
          <div className="reg-head" style={{fontFamily:fp.h}}>지금<br/>신청하세요</div>
          <div className="reg-note">마감: 2025.11.07 (금)<br/>이후 변경·취소는 준비위에 연락.</div>
        </div>
        <form className="reg-form" onSubmit={e=>e.preventDefault()}>
          <input className="reg-in" placeholder="이름"/>
          <input className="reg-in" placeholder="연락처 (010-xxxx-xxxx)"/>
          <input className="reg-in" placeholder="소속 부서 / 셀"/>
          <button className="reg-sub" type="submit" style={{background:bg,color:ink,fontFamily:fp.b}}>신청서 제출하기</button>
        </form>
      </div>
    </div>}

    {tab==="goods" && <div className="page">
      <div className="goods-mast">
        <span>RETREAT GOODS LOOKBOOK</span><span>ED. 2025 · AUTUMN</span>
      </div>
      <div className="goods-hero">
        <div className="g-hero-ph">티셔츠 · MAIN ITEM</div>
        <div className="g-side">
          <div className="g-num" style={{fontFamily:fp.h}}>01.</div>
          <div className="g-name" style={{fontFamily:fp.h}}>수련회 티셔츠</div>
          <div className="g-opt">S · M · L · XL · FREE</div>
          <div style={{fontSize:13,opacity:.65,lineHeight:1.6,marginTop:8}}>이번 수련회 주제를 담아 제작된 티셔츠입니다. 전원 무료로 제공되며 사전 신청 후 현장에서 수령하실 수 있습니다.</div>
        </div>
      </div>
      <div className="goods-sub">
        {[["02.","에코백","FREE · 1인 1개"],["03.","수련회 노트","A5 · 80p"],["04.","스티커 팩","6종 1세트"],["05.","키링","FREE"],["06.","한정 뱃지","2종 세트"],["07.","굿즈 봉투","포장 포함"]].map(([n,name,opt])=>(
          <div key={n}>
            <div className="goods-item-ph">{name}</div>
            <div className="g-item-num">{n}</div>
            <div className="g-item-name">{name}</div>
            <div className="g-item-opt">{opt}</div>
          </div>
        ))}
      </div>
    </div>}

    {tab==="faq" && <div className="page">
      <div className="faq-mast">
        <span>Q&amp;A · NOTICE</span><span>준비위가 직접 답변합니다</span>
      </div>
      <div className="faq-tabs">
        {[["faq","FAQ"],["notice","공지사항"]].map(([k,l])=>(
          <div key={k} className={"faq-tab"+(faqTab===k?" on":"")} onClick={()=>setFaqTab(k)}>{l}</div>
        ))}
      </div>

      {faqTab==="faq" && (
        <div className="faq-grid">
          {FAQS.map(({q,a},i)=>(
            <div className="faq-item" key={i} style={{borderBottomColor:mute}}>
              <div className="faq-n" style={{fontFamily:fp.h}}>{String(i+1).padStart(2,"0")}</div>
              <div className="faq-q" style={{fontFamily:fp.h}}>{q}</div>
              <div className="faq-a">{a}</div>
            </div>
          ))}
        </div>
      )}

      {faqTab==="notice" && (
        <div style={{paddingBottom:80}}>
          {NOTICES.map(({pin,title,date},i)=>(
            <div className="notice-row" key={i} style={{borderBottomColor:mute}}>
              <div>
                {pin && <div className="notice-pin" style={{color:accent}}>📌 NOTICE</div>}
                <div className="notice-t" style={{fontWeight:pin?500:400}}>{title}</div>
              </div>
              <div className="notice-d">{date}</div>
            </div>
          ))}
        </div>
      )}
    </div>}

    <TweaksPanel title="Tweaks">
      <TweakSection label="컬러 팔레트"/>
      <TweakColor label="팔레트" value={t.palette} options={PALETTES} onChange={v=>setTweak("palette",v)}/>
      <TweakSection label="타이포그래피"/>
      <TweakSelect label="폰트" value={t.font}
        options={Object.keys(FONTS).map(k=>({value:k,label:FONTS[k].l}))}
        onChange={v=>setTweak("font",v)}/>
    </TweaksPanel>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
