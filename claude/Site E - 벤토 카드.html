<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>2025 수련회 — 벤토 카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<style>
:root{
  --ink:#1f1c18;--mute:#cfc9be;--accent:#a08152;--bg:#f4f1ea;--surface:#eae7df;
  --fh:'Pretendard',system-ui,sans-serif;--fb:'Pretendard',system-ui,sans-serif;
  --max:1100px;--p:clamp(14px,3vw,32px);--r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--surface);color:var(--ink);font-family:var(--fb);-webkit-font-smoothing:antialiased}

/* ── nav ── */
.nav{background:var(--surface);padding:0 var(--p);position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--mute)}
.nav-in{max-width:var(--max);margin:0 auto;display:flex;align-items:stretch;
  justify-content:space-between;gap:8px}
.brand{font-size:13px;font-weight:600;letter-spacing:.06em;display:flex;align-items:center;
  padding:14px 0;white-space:nowrap}
.tabs{display:flex;align-items:stretch}
.tab{padding:0 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;display:flex;align-items:center;opacity:.45;transition:opacity .15s;
  white-space:nowrap}
.tab.on{border-bottom-color:var(--ink);opacity:1;font-weight:600}
.cta-btn{margin:auto 0;padding:8px 16px;background:var(--ink);color:var(--bg);
  border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;font-family:var(--fb)}

/* ── page ── */
.page{max-width:var(--max);margin:0 auto;padding:var(--p);padding-bottom:80px}

/* ── bento grid ── */
.bento{display:grid;grid-template-columns:repeat(12,1fr);
  grid-auto-rows:minmax(120px,auto);gap:clamp(8px,1.2vw,14px)}

/* card base */
.card{border-radius:var(--r);padding:clamp(18px,2.5vw,28px);
  background:var(--bg);display:flex;flex-direction:column;
  overflow:hidden;position:relative}
.card.dark{background:var(--ink);color:var(--bg)}
.card.accent-bg{background:var(--accent);color:var(--ink)}
.card.surface{background:var(--surface)}
.card-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;
  color:var(--accent);margin-bottom:8px}
.card.dark .card-lbl{color:rgba(255,255,255,.55)}
.card.accent-bg .card-lbl{opacity:.7}

/* column spans */
.c5{grid-column:span 5} .c7{grid-column:span 7}
.c4{grid-column:span 4} .c3{grid-column:span 3}
.c6{grid-column:span 6} .c8{grid-column:span 8}
.c12{grid-column:span 12} .c9{grid-column:span 9}

/* row spans */
.r2{grid-row:span 2} .r3{grid-row:span 3}

/* ── hero card ── */
.hero-card{justify-content:space-between}
.hero-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;
  margin-bottom:clamp(10px,2vw,20px)}
.hero-title{font-size:clamp(52px,9vw,108px);font-weight:500;line-height:.85;
  letter-spacing:-.04em;font-family:var(--fh)}
.hero-sub{font-size:clamp(13px,1.5vw,15px);line-height:1.6;opacity:.7;
  margin-top:clamp(10px,2vw,18px);max-width:420px}

/* ── date card ── */
.date-card{align-items:flex-start;justify-content:space-between}
.date-big{font-size:clamp(34px,5vw,60px);font-weight:500;letter-spacing:-.03em;
  font-family:var(--fh);line-height:.9}
.date-small{font-size:clamp(11px,1.3vw,13px);opacity:.55;margin-top:8px}

/* ── place card ── */
.ph-map{flex:1;border:1.5px dashed var(--mute);display:flex;align-items:center;
  justify-content:center;background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);
  color:#9a958a;font-size:12px;border-radius:8px;min-height:80px;margin-top:8px}

/* ── verse card ── */
.verse-text{font-size:clamp(13.5px,1.6vw,16px);line-height:1.65;opacity:.9;
  font-family:var(--fh)}
.verse-ref{font-size:12px;opacity:.5;margin-top:10px}

/* ── schedule card ── */
.day-tabs{display:flex;gap:6px;margin-bottom:14px}
.day-tab{padding:4px 10px;font-size:11px;border-radius:999px;cursor:pointer;
  border:1px solid var(--mute);transition:all .15s;font-weight:400;background:transparent;font-family:var(--fb)}
.day-tab.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.sched-row{display:grid;grid-template-columns:54px 1fr;gap:8px;padding:8px 0;
  border-bottom:1px solid var(--mute);font-size:13px;align-items:baseline}
.sched-row:last-child{border-bottom:none}
.sched-t{font-family:ui-monospace,monospace;opacity:.5}

/* ── prep card ── */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip{padding:5px 12px;border:1px solid var(--mute);border-radius:999px;font-size:12.5px}

/* ── team card ── */
.team-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.team-tile{background:var(--surface);border-radius:8px;padding:10px 8px;text-align:center}
.team-tile.dark-t{background:rgba(255,255,255,.08)}
.team-n{font-size:22px;font-weight:500;font-family:var(--fh);line-height:1}
.team-s{font-size:10px;opacity:.45;margin-top:3px}

/* ── CTA card ── */
.cta-card{flex-direction:row;align-items:center;justify-content:space-between;gap:20px}
.cta-left{display:flex;flex-direction:column;gap:6px}
.cta-lbl{font-size:10px;letter-spacing:.22em;font-weight:600;opacity:.65}
.cta-title{font-size:clamp(20px,3.5vw,38px);font-weight:500;letter-spacing:-.02em;font-family:var(--fh)}
.cta-dl{font-size:13px;opacity:.65}
.cta-arrow{font-size:clamp(28px,5vw,52px);opacity:.6}
.cta-form{display:flex;flex-direction:column;gap:8px;min-width:clamp(180px,30%,280px)}
.cta-in{height:38px;padding:0 12px;font-size:13px;border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.1);color:var(--bg);border-radius:6px;font-family:var(--fb)}
.cta-in::placeholder{opacity:.4;color:var(--bg)}
.cta-sub{height:38px;background:var(--bg);color:var(--ink);border:none;border-radius:6px;
  font-weight:600;font-size:13.5px;cursor:pointer;font-family:var(--fb)}

/* ── goods ── */
.goods-bento{display:grid;grid-template-columns:repeat(12,1fr);
  grid-auto-rows:minmax(120px,auto);gap:clamp(8px,1.2vw,14px)}
.g-card{border-radius:var(--r);overflow:hidden;background:var(--bg);
  display:flex;flex-direction:column}
.g-ph{flex:1;min-height:140px;border:1.5px dashed var(--mute);display:flex;align-items:center;
  justify-content:center;background:repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px);
  color:#9a958a;font-size:12.5px;margin:12px 12px 0}
.g-info{padding:10px 14px 14px}
.g-name{font-size:15px;font-weight:500}
.g-opt{font-size:12px;opacity:.5;margin-top:2px}

/* ── notice bento ── */
.n-card{border-radius:var(--r);padding:clamp(16px,2vw,24px);background:var(--bg);
  display:flex;flex-direction:column;gap:8px}
.n-pin{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--accent)}
.n-title{font-size:clamp(13.5px,1.6vw,16px);font-weight:500;line-height:1.4}
.n-date{font-size:11px;opacity:.45;font-family:ui-monospace,monospace;margin-top:auto}
.faq-card{border-radius:var(--r);padding:clamp(16px,2vw,24px);background:var(--bg);
  display:flex;flex-direction:column;gap:6px}
.faq-n{font-size:clamp(30px,4vw,52px);font-weight:400;opacity:.1;letter-spacing:-.04em;
  font-family:var(--fh);line-height:1}
.faq-q{font-size:clamp(13px,1.5vw,15px);font-weight:500;line-height:1.4}
.faq-a{font-size:12.5px;opacity:.6;line-height:1.6;margin-top:4px}

/* ── responsive ── */
@media(max-width:900px){
  .c5{grid-column:span 12}.c7{grid-column:span 12}
  .c4{grid-column:span 6}.c3{grid-column:span 6}
  .c6{grid-column:span 12}.c8{grid-column:span 12}
  .c9{grid-column:span 12}.r2{grid-row:span 1}.r3{grid-row:span 1}
  .cta-card{flex-direction:column;align-items:flex-start}
  .cta-form{min-width:100%;width:100%}
}
@media(max-width:600px){
  .c4{grid-column:span 12}.c3{grid-column:span 12}
  .tab{padding:0 9px;font-size:12px}
  .cta-btn{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const {TweaksPanel,useTweaks,TweakSection,TweakColor,TweakSelect}=window;

const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{
  "palette": [
    "#1f1c18",
    "#cfc9be",
    "#a08152",
    "#f4f1ea"
  ],
  "font": "pretendard"
}/*EDITMODE-END*/;
const PALETTES=[["#1f1c18","#cfc9be","#a08152","#f4f1ea"],["#171717","#d6d4cf","#5d6f5b","#f1efe9"],["#13171c","#cfd2d8","#5b6f8a","#eef0f3"],["#1a1a1a","#cfcfcf","#1a1a1a","#fafafa"],["#1f1a14","#dcd3c3","#7c5a3a","#ebe3d4"]];
const FONTS={pretendard:{h:'"Pretendard",system-ui,sans-serif',b:'"Pretendard",system-ui,sans-serif',l:"Pretendard"},gowundodum:{h:'"Gowun Dodum",system-ui,sans-serif',b:'"Gowun Dodum",system-ui,sans-serif',l:"Gowun Dodum"},serif:{h:'"Noto Serif KR",serif',b:'"Noto Sans KR",sans-serif',l:"Noto Serif KR"},plex:{h:'"IBM Plex Sans KR",sans-serif',b:'"IBM Plex Sans KR",sans-serif',l:"IBM Plex Sans KR"}};

const SCHED={
  "DAY 01":[["17:00","도착·방 배정"],["19:00","저녁 식사"],["20:30","개회 예배·첫 말씀"],["22:30","조모임"]],
  "DAY 02":[["07:00","경건회"],["09:30","둘째 말씀"],["13:00","팀 액티비티"],["19:30","찬양의 밤"]],
  "DAY 03":[["08:30","주일 예배"],["11:30","폐회·점심"],["13:00","해산"]],
};

function App(){
  const [t,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const [tab,setTab]=useState("info");
  const [day,setDay]=useState("DAY 01");
  const [ink,mute,accent,bg]=t.palette;
  const fp=FONTS[t.font]||FONTS.pretendard;
  const surface=bg==="fafafa"?"#f0f0f0":"#e8e4db";

  useEffect(()=>{
    const s=document.documentElement.style;
    s.setProperty("--ink",ink);s.setProperty("--mute",mute);
    s.setProperty("--accent",accent);s.setProperty("--bg",bg);
    s.setProperty("--surface",surface);
    s.setProperty("--fh",fp.h);s.setProperty("--fb",fp.b);
    document.body.style.background=surface;
  },[ink,mute,accent,bg,fp,surface]);

  return(<>
    <nav className="nav" style={{background:surface}}>
      <div className="nav-in">
        <div className="brand">○○교회 · 2025 수련회</div>
        <div className="tabs">
          {[["info","수련회 정보"],["goods","굿즈"],["faq","FAQ / 공지"]].map(([k,l])=>(
            <div key={k} className={"tab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>{l}</div>
          ))}
        </div>
        <button className="cta-btn" onClick={()=>setTab("info")}>신청하기 →</button>
      </div>
    </nav>

    {tab==="info" && <div className="page">
      <div className="bento">

        {/* 1. 히어로 카드 — 주제 + 기간 */}
        <div className="card dark hero-card c7 r2" style={{background:ink,color:bg}}>
          <div>
            <div className="hero-eyebrow" style={{color:"rgba(255,255,255,.55)"}}>2025 AUTUMN RETREAT</div>
            <div className="hero-title" style={{fontFamily:fp.h}}>쉼.</div>
          </div>
          <div className="hero-sub">마태복음 11:28 — "수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라"</div>
        </div>

        {/* 2. 일정 카드 — 인터랙티브 */}
        <div className="card c5 r2" style={{background:bg}}>
          <div className="card-lbl" style={{color:accent}}>전체 일정</div>
          <div className="day-tabs">
            {Object.keys(SCHED).map(d=>(
              <button key={d} className={"day-tab"+(day===d?" on":"")} onClick={()=>setDay(d)}
                style={day===d?{background:ink,color:bg,borderColor:ink}:{borderColor:mute}}>{d}</button>
            ))}
          </div>
          <div style={{flex:1}}>
            {SCHED[day].map(([time,name])=>(
              <div className="sched-row" key={time} style={{borderBottomColor:mute}}>
                <span className="sched-t">{time}</span><span>{name}</span>
              </div>
            ))}
          </div>
        </div>

        {/* 3. 날짜 카드 */}
        <div className="card date-card c3">
          <div className="card-lbl" style={{color:accent}}>일정</div>
          <div className="date-big" style={{fontFamily:fp.h}}>11.14<br/>—<br/>11.16</div>
          <div className="date-small">금 · 토 · 일 / 2박 3일</div>
        </div>

        {/* 4. 장소 카드 */}
        <div className="card c4">
          <div className="card-lbl" style={{color:accent}}>오시는 길</div>
          <div style={{fontSize:15,fontWeight:500}}>양평 ○○수양관</div>
          <div className="ph-map" style={{borderColor:mute}}>지도</div>
        </div>

        {/* 5. 포스터 */}
        <div className="card c5 r2" style={{padding:0,overflow:"hidden"}}>
          <div style={{flex:1,minHeight:200,display:"flex",alignItems:"center",justifyContent:"center",
            background:`repeating-linear-gradient(135deg,transparent 0 9px,rgba(0,0,0,.025) 9px 10px)`,
            border:`1.5px dashed ${mute}`,borderRadius:`${14}px`,margin:12,color:"#9a958a",fontSize:13}}>포스터</div>
        </div>

        {/* 6. 말씀 카드 */}
        <div className="card c7">
          <div className="card-lbl" style={{color:accent}}>주제 말씀</div>
          <div className="verse-text" style={{fontFamily:fp.h}}>"수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라"</div>
          <div className="verse-ref">— 마태복음 11:28</div>
        </div>

        {/* 7. 준비물 카드 */}
        <div className="card c6">
          <div className="card-lbl" style={{color:accent}}>준비물 체크리스트</div>
          <div className="chips">
            {["성경","개인 컵","세면도구","편한 옷","필기구","담요","개인 약","현금"].map(c=>(
              <span className="chip" key={c} style={{borderColor:mute}}>{c}</span>
            ))}
          </div>
        </div>

        {/* 8. 조 편성 카드 */}
        <div className="card c6">
          <div className="card-lbl" style={{color:accent}}>조 편성</div>
          <div style={{fontSize:13,opacity:.65,marginBottom:6}}>총 8개 조 · 조장 배정 예정</div>
          <div className="team-mini-grid">
            {Array.from({length:8},(_,i)=>(
              <div className="team-tile" key={i} style={{background:surface}}>
                <div className="team-n" style={{fontFamily:fp.h}}>{i+1}</div>
                <div className="team-s">{i+1}조</div>
              </div>
            ))}
          </div>
        </div>

        {/* 9. 신청 CTA 카드 — accent */}
        <div className="card accent-bg cta-card c12" style={{background:accent,color:ink}}>
          <div className="cta-left">
            <div className="cta-lbl">REGISTER</div>
            <div className="cta-title" style={{fontFamily:fp.h}}>지금 신청하세요</div>
            <div className="cta-dl">마감 2025.11.07 (금) · 전원 무료</div>
          </div>
          <form className="cta-form" onSubmit={e=>e.preventDefault()}>
            <input className="cta-in" placeholder="이름" style={{color:ink,background:"rgba(255,255,255,.35)",border:`1px solid rgba(0,0,0,.12)`}}/>
            <input className="cta-in" placeholder="연락처" style={{color:ink,background:"rgba(255,255,255,.35)",border:`1px solid rgba(0,0,0,.12)`}}/>
            <input className="cta-in" placeholder="소속 부서 / 셀" style={{color:ink,background:"rgba(255,255,255,.35)",border:`1px solid rgba(0,0,0,.12)`}}/>
            <button className="cta-sub" type="submit" style={{background:ink,color:bg,fontFamily:fp.b}}>신청서 제출하기</button>
          </form>
        </div>

      </div>
    </div>}

    {tab==="goods" && <div className="page">
      <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
        <div>
          <div style={{fontSize:10.5,letterSpacing:".2em",textTransform:"uppercase",fontWeight:600,color:accent,marginBottom:6}}>2025 RETREAT GOODS</div>
          <div style={{fontSize:"clamp(20px,3vw,28px)",fontWeight:500,letterSpacing:"-.02em",fontFamily:fp.h}}>수련회 굿즈 안내</div>
        </div>
        <div style={{fontSize:13,opacity:.6}}>전원 무료 · 사전 신청</div>
      </div>
      <div className="goods-bento">
        {/* hero goods */}
        <div className="g-card c5 r2" style={{background:bg}}>
          <div className="g-ph" style={{borderColor:mute,minHeight:260}}>티셔츠</div>
          <div className="g-info">
            <div style={{fontSize:10,letterSpacing:".15em",color:accent,fontWeight:600,marginBottom:4}}>01 · MAIN ITEM</div>
            <div className="g-name">수련회 티셔츠</div>
            <div className="g-opt">S · M · L · XL · FREE</div>
          </div>
        </div>
        {/* sub goods */}
        {[["02","에코백","FREE · 1인 1개","c3"],["03","수련회 노트","A5 · 80p","c4"],
          ["04","스티커 팩","6종 1세트","c3"],["05","키링","FREE","c3"],
          ["06","한정 뱃지","2종 세트","c3"]].map(([n,name,opt,col])=>(
          <div key={n} className={`g-card ${col}`} style={{background:bg}}>
            <div className="g-ph" style={{borderColor:mute}}>{name}</div>
            <div className="g-info">
              <div style={{fontSize:9.5,letterSpacing:".15em",color:accent,fontWeight:600,marginBottom:3}}>{n}.</div>
              <div className="g-name">{name}</div>
              <div className="g-opt">{opt}</div>
            </div>
          </div>
        ))}
        {/* CTA */}
        <div className="card dark c12" style={{background:ink,color:bg,flexDirection:"row",alignItems:"center",justifyContent:"space-between",padding:"clamp(20px,3vw,36px)"}}>
          <div>
            <div style={{fontSize:10,letterSpacing:".2em",opacity:.55,marginBottom:8}}>전체 신청</div>
            <div style={{fontSize:"clamp(18px,3vw,28px)",fontWeight:500,fontFamily:fp.h}}>굿즈 사전 신청서 →</div>
          </div>
          <div style={{fontSize:13,opacity:.55}}>마감: 11.07 (금)</div>
        </div>
      </div>
    </div>}

    {tab==="faq" && <div className="page">
      <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
        <div style={{fontSize:"clamp(20px,3vw,28px)",fontWeight:500,letterSpacing:"-.02em",fontFamily:fp.h}}>새 소식 · FAQ</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:"clamp(8px,1.2vw,14px)",gridAutoRows:"minmax(100px,auto)"}}>
        {/* pinned notice */}
        <div className="n-card c8" style={{background:accent,color:ink}}>
          <div className="n-pin" style={{color:ink,opacity:.7}}>📌 필독 공지 · 11.10</div>
          <div className="n-title" style={{fontSize:"clamp(16px,2.2vw,22px)",fontFamily:fp.h}}>[필독] 출발 시간이 16:30으로 변경되었습니다</div>
          <div style={{fontSize:13,opacity:.7,marginTop:6}}>교회 본당 1층 · 단체 버스 탑승</div>
        </div>
        <div className="n-card c4" style={{background:bg}}>
          <div style={{fontSize:10,letterSpacing:".2em",color:accent,fontWeight:600}}>단체 채팅방</div>
          <div style={{fontSize:15,fontWeight:500,marginTop:6,lineHeight:1.4}}>수련회 단톡방 입장 링크</div>
          <div style={{marginTop:"auto",fontSize:12,opacity:.5}}>확인 완료 후 신청</div>
        </div>

        {[["11.05","조 편성 안내 (1~8조)","조장 연락처 포함","c3"],
          ["11.04","숙소 배정 안내","룸메이트 확인","c3"],
          ["10.30","준비물 안내","양평 날씨 참고","c3"],
          ["10.20","2차 사전 모임","10.26 주일 1부 후","c3"]].map(([d,ttl,sub,col])=>(
          <div key={d} className={`n-card ${col}`} style={{background:bg}}>
            <div className="n-date">{d}</div>
            <div className="n-title">{ttl}</div>
            <div style={{fontSize:11.5,opacity:.55}}>{sub}</div>
          </div>
        ))}

        {/* FAQ cards */}
        <div style={{gridColumn:"span 12",fontSize:10.5,letterSpacing:".2em",fontWeight:600,color:accent,paddingTop:8}}>자주 묻는 질문</div>
        {[["참가비는 얼마인가요?","무료입니다. 모든 비용은 교회 예산과 후원으로 충당됩니다.","c3"],
          ["식사는 모두 제공되나요?","조식·중식·석식 모두 무료 제공됩니다.","c3"],
          ["가족도 참가 가능한가요?","성인 교인 및 그 가족은 함께 신청 가능합니다.","c3"],
          ["처음이라도 괜찮을까요?","물론입니다! 처음 오시는 분들을 위한 시간도 있어요.","c3"],
          ["환불은 가능한가요?","무료 행사이므로 별도 환불 없음. 불참 시 준비위에 연락.","c4"],
          ["굿즈는 언제 받나요?","수련회 당일 리셉션 데스크에서 수령하실 수 있습니다.","c5"]].map(([q,a,col],i)=>(
          <div key={i} className={`faq-card ${col}`} style={{background:bg}}>
            <div className="faq-n" style={{fontFamily:fp.h}}>{String(i+1).padStart(2,"0")}</div>
            <div className="faq-q">{q}</div>
            <div className="faq-a">{a}</div>
          </div>
        ))}
      </div>
    </div>}

    <TweaksPanel title="Tweaks">
      <TweakSection label="컬러 팔레트"/>
      <TweakColor label="팔레트" value={t.palette} options={PALETTES} onChange={v=>setTweak("palette",v)}/>
      <TweakSection label="타이포그래피"/>
      <TweakSelect label="폰트" value={t.font}
        options={Object.keys(FONTS).map(k=>({value:k,label:FONTS[k].l}))}
        onChange={v=>setTweak("font",v)}/>
    </TweaksPanel>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
